<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Manajemen Buku - Tugas Kelompok</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen antialiased selection:bg-indigo-500 selection:text-white">

    <div class="max-w-6xl mx-auto px-4 py-8 md:py-12">
        <header class="flex flex-col items-center text-center mb-12 animate-fade-in">
            <div class="inline-flex items-center justify-center p-3 bg-indigo-600 rounded-2xl shadow-xl shadow-indigo-200 text-white text-3xl mb-4">
                📚
            </div>
            <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight bg-gradient-to-r bg-indigo-600 to-violet-600 bg-clip-text text-transparent">
                Book Tracking App
            </h1>
            <p class="text-slate-500 font-medium mt-2 max-w-md">
                Sistem Manajemen Membaca Praktis — Tugas Kelompok Cloud Deployment (Statik)
            </p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 items-start">
            
            <div class="lg:col-span-1 bg-white p-6 rounded-2xl border border-slate-100 shadow-xl shadow-slate-100 sticky top-6">
                <div class="flex items-center gap-3 mb-6">
                    <div class="w-2 h-6 bg-indigo-600 rounded-full"></div>
                    <h2 class="text-xl font-bold text-slate-900">Tambah Buku</h2>
                </div>
                
                <form id="book-form" class="space-y-5">
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1.5">Judul Buku</label>
                        <input type="text" id="book-title" required 
                            class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl font-medium placeholder-slate-400 focus:outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 transition-all" 
                            placeholder="Contoh: Laskar Pelangi">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1.5">Penulis</label>
                        <input type="text" id="book-author" required 
                            class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl font-medium placeholder-slate-400 focus:outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 transition-all" 
                            placeholder="Contoh: Andrea Hirata">
                    </div>
                    <div class="flex items-center p-3 bg-slate-50 rounded-xl border border-slate-100 transition-colors hover:bg-slate-100/50">
                        <input type="checkbox" id="book-status" 
                            class="w-4 h-4 rounded-md text-indigo-600 focus:ring-indigo-500 border-slate-300 accent-indigo-600 cursor-pointer">
                        <label for="book-status" class="ml-3 text-sm font-semibold text-slate-600 cursor-pointer select-none">
                            Tandai sudah selesai dibaca
                        </label>
                    </div>
                    
                    <button type="submit" 
                        class="w-full py-3.5 px-6 bg-indigo-600 text-white font-semibold rounded-xl shadow-lg shadow-indigo-600/20 hover:bg-indigo-700 active:scale-[0.99] transition-all cursor-pointer">
                        Simpan ke Rak
                    </button>
                </form>
            </div>

            <div class="lg:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-8 items-start">
                
                <section class="bg-amber-50/40 p-6 rounded-2xl border border-amber-100 shadow-sm">
                    <div class="flex items-center justify-between mb-5 border-b pb-3 border-amber-200/50">
                        <h2 class="text-lg font-bold text-amber-900 flex items-center gap-2">
                            <span>⏳</span> Sedang Dibaca
                        </h2>
                        <span id="unread-count" class="px-2.5 py-0.5 text-xs font-bold bg-amber-100 text-amber-800 rounded-full">0</span>
                    </div>
                    <div id="unread-list" class="space-y-4">
                        </div>
                </section>

                <section class="bg-emerald-50/40 p-6 rounded-2xl border border-emerald-100 shadow-sm">
                    <div class="flex items-center justify-between mb-5 border-b pb-3 border-emerald-200/50">
                        <h2 class="text-lg font-bold text-emerald-900 flex items-center gap-2">
                            <span>✅</span> Selesai Dibaca
                        </h2>
                        <span id="read-count" class="px-2.5 py-0.5 text-xs font-bold bg-emerald-100 text-emerald-800 rounded-full">0</span>
                    </div>
                    <div id="read-list" class="space-y-4">
                        </div>
                </section>

            </div>
        </div>
    </div>

    <div id="edit-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-xs hidden transition-all duration-300">
        <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl border border-slate-100 overflow-hidden transform scale-95 transition-transform duration-300 p-6">
            <div class="flex items-center justify-between mb-5 border-b pb-3 border-slate-100">
                <h3 class="text-xl font-bold text-slate-900 flex items-center gap-2">
                    <span>✏️</span> Edit Detail Buku
                </h3>
                <button type="button" onclick="closeModal()" class="text-slate-400 hover:text-slate-600 transition-colors p-1 rounded-lg hover:bg-slate-50 cursor-pointer">✕</button>
            </div>

            <form id="modal-form" class="space-y-4">
                <input type="hidden" id="modal-book-id">
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Judul Buku</label>
                    <input type="text" id="modal-book-title" required 
                        class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl font-medium focus:outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 transition-all">
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Penulis</label>
                    <input type="text" id="modal-book-author" required 
                        class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl font-medium focus:outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 transition-all">
                </div>
                <div class="flex items-center p-3 bg-slate-50 rounded-xl border border-slate-100">
                    <input type="checkbox" id="modal-book-status" class="w-4 h-4 rounded text-indigo-600 accent-indigo-600 cursor-pointer">
                    <label for="modal-book-status" class="ml-3 text-sm font-semibold text-slate-600 cursor-pointer select-none">
                        Saya sudah selesai membaca buku ini
                    </label>
                </div>

                <div class="flex items-center gap-3 pt-3 justify-end border-t border-slate-100 mt-6">
                    <button type="button" onclick="closeModal()" 
                        class="px-5 py-2.5 bg-slate-100 text-slate-600 font-semibold rounded-xl hover:bg-slate-200 transition-colors cursor-pointer">
                        Batal
                    </button>
                    <button type="submit" 
                        class="px-5 py-2.5 bg-indigo-600 text-white font-semibold rounded-xl hover:bg-indigo-700 shadow-md shadow-indigo-600/10 transition-colors cursor-pointer">
                        Perbarui Data
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Reactive State Storage Array
        let books = JSON.parse(localStorage.getItem('books')) || [];

        // DOM Input Nodes Declarations
        const bookForm = document.getElementById('book-form');
        const bookTitleInput = document.getElementById('book-title');
        const bookAuthorInput = document.getElementById('book-author');
        const bookStatusInput = document.getElementById('book-status');

        // Modal DOM Nodes Declarations
        const editModal = document.getElementById('edit-modal');
        const modalForm = document.getElementById('modal-form');
        const modalIdInput = document.getElementById('modal-book-id');
        const modalTitleInput = document.getElementById('modal-book-title');
        const modalAuthorInput = document.getElementById('modal-book-author');
        const modalStatusInput = document.getElementById('modal-book-status');

        // Trigger First Paint UI
        document.addEventListener('DOMContentLoaded', renderBooks);

        // Core Handler: Create Data Baru
        bookForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const newBook = {
                id: +new Date(),
                title: bookTitleInput.value.trim(),
                author: bookAuthorInput.value.trim(),
                isCompleted: bookStatusInput.checked
            };
            books.push(newBook);
            saveAndRender();
            bookForm.reset();
        });

        // Core Handler: Update Data Berdasarkan Modal Form
        modalForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const id = modalIdInput.value;
            books = books.map(book => book.id == id ? {
                ...book,
                title: modalTitleInput.value.trim(),
                author: modalAuthorInput.value.trim(),
                isCompleted: modalStatusInput.checked
            } : book);
            saveAndRender();
            closeModal();
        });

        // Pipeline Sync Utility
        function saveAndRender() {
            localStorage.setItem('books', JSON.stringify(books));
            renderBooks();
        }

        // Render UI Pipeline Loop
        function renderBooks() {
            const unreadList = document.getElementById('unread-list');
            const readList = document.getElementById('read-list');
            
            unreadList.innerHTML = '';
            readList.innerHTML = '';

            let unreadCount = 0;
            let readCount = 0;

            books.forEach(book => {
                const bookCard = document.createElement('div');
                bookCard.className = 'bg-white p-4 rounded-xl border border-slate-100 shadow-xs flex flex-col gap-3 justify-between hover:shadow-md transition-shadow duration-200';
                bookCard.innerHTML = `
                    <div>
                        <h3 class="font-bold text-slate-800 text-base leading-tight">${book.title}</h3>
                        <p class="text-xs font-medium text-slate-400 mt-1">Penulis: <span class="text-slate-600">${book.author}</span></p>
                    </div>
                    <div class="flex items-center justify-between border-t pt-2.5 border-slate-50 mt-1">
                        <button onclick="toggleStatus(${book.id})" class="text-xs px-2.5 py-1.5 font-semibold rounded-lg bg-indigo-50 text-indigo-600 hover:bg-indigo-100 transition-colors cursor-pointer flex items-center gap-1">
                            ${book.isCompleted ? '💥 Belum' : '✔️ Selesai'}
                        </button>
                        <div class="flex items-center gap-1.5">
                            <button onclick="openEditModal(${book.id})" class="text-xs p-1.5 font-semibold rounded-lg bg-slate-50 text-amber-600 hover:bg-amber-50 transition-colors cursor-pointer" title="Edit Buku">
                                ✏️
                            </button>
                            <button onclick="deleteBook(${book.id})" class="text-xs p-1.5 font-semibold rounded-lg bg-slate-50 text-red-600 hover:bg-red-50 transition-colors cursor-pointer" title="Hapus Buku">
                                🗑️
                            </button>
                        </div>
                    </div>
                `;

                if (book.isCompleted) {
                    readList.appendChild(bookCard);
                    readCount++;
                } else {
                    unreadList.appendChild(bookCard);
                    unreadCount++;
                }
            });

            document.getElementById('unread-count').innerText = unreadCount;
            document.getElementById('read-count').innerText = readCount;

            if (unreadCount === 0) unreadList.innerHTML = `<div class="text-center py-6 text-xs text-slate-400 font-medium italic bg-slate-100/50 rounded-xl border border-dashed border-slate-200">Kosong</div>`;
            if (readCount === 0) readList.innerHTML = `<div class="text-center py-6 text-xs text-slate-400 font-medium italic bg-slate-100/50 rounded-xl border border-dashed border-slate-200">Kosong</div>`;
        }

        // Action: Delete Logic
        function deleteBook(id) {
            if(confirm('Apakah Anda yakin ingin menghapus buku ini?')) {
                books = books.filter(book => book.id !== id);
                saveAndRender();
            }
        }

        // Action: Quick Toggle Status Reading State
        function toggleStatus(id) {
            books = books.map(book => book.id === id ? { ...book, isCompleted: !book.isCompleted } : book);
            saveAndRender();
        }

        // Modal Mechanism Controlling
        function openEditModal(id) {
            const book = books.find(b => b.id === id);
            if (book) {
                modalIdInput.value = book.id;
                modalTitleInput.value = book.title;
                modalAuthorInput.value = book.author;
                modalStatusInput.checked = book.isCompleted;

                editModal.classList.remove('hidden');
                document.body.classList.add('overflow-hidden'); // Lock background scroll
            }
        }

        function closeModal() {
            editModal.classList.add('hidden');
            document.body.classList.remove('overflow-hidden');
            modalForm.reset();
        }

        // Close Modal on Dark Backdrop click
        window.onclick = function(event) {
            if (event.target == editModal) {
                closeModal();
            }
        }
    </script>
</body>
</html>
